<article
  class="product-card"
  role="button"
  tabindex="0"
  aria-label="Abrir detalhes do produto"
  (click)="onOpenProduct()"
  (keydown.enter)="onOpenProduct()"
  (keydown.space)="onOpenProduct()"
>
  <img [src]="product.image" [alt]="product.title" />
  <h3>{{ product.title }}</h3>
  <p>{{ product.category }}</p>
  <strong>{{ product.price | currency }}</strong>
</article>
