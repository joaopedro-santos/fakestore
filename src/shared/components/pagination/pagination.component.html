<nav class="pagination" aria-label="Pagination">
  <button mat-stroked-button type="button" [disabled]="page <= 1" (click)="previous()">Anterior</button>
  <span class="page-indicator">Página {{ page }} de {{ totalPages }}</span>
  <button mat-stroked-button type="button" [disabled]="page >= totalPages" (click)="next()">Próxima</button>
</nav>
