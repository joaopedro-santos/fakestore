<ion-menu
  menuId="main-mobile-menu"
  contentId="app-layout-main-content"
  side="start"
  type="overlay"
  class="mobile-side-menu"
>
  <ion-content>
    <div class="mobile-side-menu__header">Menu</div>

    <ion-list lines="none">
      <ion-menu-toggle [autoHide]="true">
        <ion-item
          class="menu-item"
          [routerLink]="dashboardRoute"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
        >
          <ion-label>Dashboard</ion-label>
        </ion-item>
      </ion-menu-toggle>

      <ion-menu-toggle [autoHide]="true">
        <ion-item
          class="menu-item"
          [routerLink]="productsRoute"
          routerLinkActive="is-active"
          (click)="closeMobileMenu()"
        >
          <ion-label>Produtos</ion-label>
        </ion-item>
      </ion-menu-toggle>

      <ion-menu-toggle [autoHide]="true">
        <ion-item
          class="menu-item"
          [routerLink]="createProductRoute"
          routerLinkActive="is-active"
          (click)="closeMobileMenu()"
        >
          <ion-label>Novo produto</ion-label>
        </ion-item>
      </ion-menu-toggle>

      <ion-menu-toggle [autoHide]="true">
        <ion-item class="menu-item menu-item--logout" button detail="false" (click)="logout()">
          <ion-label>Sair</ion-label>
        </ion-item>
      </ion-menu-toggle>
    </ion-list>
  </ion-content>
</ion-menu>

<div class="app-layout ion-page">
  <header class="app-layout__header">
    <div class="container app-layout__header-content">
      <div class="brand-container" [routerLink]="dashboardRoute" (click)="closeMobileMenu()">
        <img src="suzantur.png" alt="Suzantur Logo" srcset="" />
        <div class="brand">Suzantur Store</div>
      </div>

      <div class="header-controls">
        <!-- <div class="theme-switch" role="group" aria-label="Selecionar tema">
          <button
            type="button"
            class="theme-switch__button"
            [class.theme-switch__button--active]="activeTheme() === 'light'"
            [attr.aria-pressed]="activeTheme() === 'light'"
            (click)="setTheme('light')"
          >
            🔆
          </button>

          <button
            type="button"
            class="theme-switch__button"
            [class.theme-switch__button--active]="activeTheme() === 'dark'"
            [attr.aria-pressed]="activeTheme() === 'dark'"
            (click)="setTheme('dark')"
          >
            🌑
          </button>
        </div> -->

        <ion-menu-button
          class="menu-toggle"
          menu="main-mobile-menu"
          autoHide="false"
          aria-label="Abrir menu"
        ></ion-menu-button>
      </div>

      <nav
        id="main-navigation"
        class="main-nav"
        aria-label="Navegação principal"
      >
        <a
          [routerLink]="dashboardRoute"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMobileMenu()"
        >
          Dashboard
        </a>

        <a [routerLink]="productsRoute" routerLinkActive="is-active" (click)="closeMobileMenu()">
          Produtos
        </a>

        <button type="button" class="logout" (click)="logout()">Sair</button>
      </nav>
    </div>
  </header>

  <ion-content id="app-layout-main-content" [fullscreen]="false" class="app-layout__main">
    <div class="container app-layout__main-content">
      @if (breadcrumbs$ | async; as breadcrumbs) {
        <nav class="breadcrumbs" aria-label="Breadcrumb">
          @for (item of breadcrumbs; track item.url) {
            @if (!item.current) {
              <a [routerLink]="item.url">{{ item.label }}</a>
              <span aria-hidden="true">/</span>
            } @else {
              <span class="current">{{ item.label }}</span>
            }
          }
        </nav>
      }

      <router-outlet />
    </div>
  </ion-content>
</div>
